  .nav-item {

    border-left: 2px solid #6366F1;

  .nav-item.active::before {

    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 100%;
    background: linear-gradient(90deg, rgba(99,102,241,0.1), transparent);
  }

  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }

  .shimmer {
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    background-size: 200% 100%;

  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }

  }

    to { transform: rotate(360deg); }

  .tooltip {

  .tooltip::after {

    bottom: 100%;
    left: 50%;

    color: #F1F5F9;

    font-size: 11px;
    font-weight: 500;

    content: '|';
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>

const MiniChart = ({ data, color = "#6366F1", id }) => {
  const canvasRef = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext("2d");
    chartRef.current = new Chart(ctx, {
      type: "line",
      data: {
        labels: data.map((_,i)=>i),
        datasets: [{ data, borderColor: color, borderWidth: 2, fill: true, backgroundColor: `${color}15`, tension: 0.4, pointRadius: 0 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{enabled:false}}, scales:{x:{display:false},y:{display:false}} }
    });
    return () => chartRef.current?.destroy();
  }, []);
  return <canvas ref={canvasRef} style={{ height:48 }} />;
};

const BigChart = ({ title, subtitle, id, type="line", labels, datasets, height=180 }) => {
  const canvasRef = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext("2d");
    chartRef.current = new Chart(ctx, {
      type,
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: datasets.length > 1, labels: { color:"#94A3B8", font:{size:11}, boxWidth:12, padding:16 } } },
        scales: {
          x: { grid:{color:"rgba(255,255,255,0.04)"}, ticks:{color:"#475569",font:{size:10}} },
          y: { grid:{color:"rgba(255,255,255,0.04)"}, ticks:{color:"#475569",font:{size:10}} }
        }
      }
    });
    return () => chartRef.current?.destroy();
  }, []);
  return (
    <div className="glass" style={{ borderRadius:14, padding:"18px 20px", border:"1px solid rgba(255,255,255,0.06)" }}>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:14, fontWeight:700, color:"#F1F5F9" }}>{title}</div>
        {subtitle && <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>{subtitle}</div>}
      </div>
      <div style={{ height }}>
        <canvas ref={canvasRef} />
      </div>
    </div>
  );
};

const App = () => {

  const [notifications, setNotifications] = useState(MOCK_NOTIFICATIONS);
  const [darkMode, setDarkMode] = useState(true);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [showOnboarding, setShowOnboarding] = useState(false);

  const pageTitle = {
    dashboard: "Dashboard",

    leads: "Leads",
    projects: "Projects",
    followups: "Follow Ups",
    revenue: "Revenue",
    aiagent: "AI Agent",
    notifications: "Notifications",
    settings: "Settings",
  };

  const renderPage = () => {
    switch(active) {
      case "dashboard": return <Dashboard setActive={setActive} />;
      case "linkedin": return <LinkedInCRM />;
      case "instagram": return <InstagramCRM />;
      case "leads": return <LeadsPage />;
      case "projects": return <ProjectsPage />;
      case "followups": return <FollowUpsPage />;
      case "revenue": return <RevenuePage />;

      case "notifications": return <NotificationsPage notifications={notifications} setNotifications={setNotifications} />;
      case "settings": return <SettingsPage darkMode={darkMode} setDarkMode={setDarkMode} />;
      default: return <Dashboard setActive={setActive} />;
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg-primary)" }}>
      {/* Background orbs */}
      <div className="orb" style={{ width:600, height:600, background:"rgba(99,102,241,0.04)", top:-200, left:-100 }} />
      <div className="orb" style={{ width:400, height:400, background:"rgba(139,92,246,0.04)", bottom:-100, right:-100 }} />

      <Sidebar active={active} setActive={(p) => { setActive(p); setSidebarOpen(false); }} sidebarOpen={sidebarOpen} />
      <Navbar setActive={setActive} notifications={notifications} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} />

      {/* Mobile overlay */}
      {sidebarOpen && <div onClick={() => setSidebarOpen(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:39 }} />}

      {/* Main content */}
      <div style={{ marginLeft:220, paddingTop:56 }}>
        <div style={{ padding:"24px 28px", maxWidth:1400 }}>

          <div style={{ fontSize:11, color:"#334155", marginBottom:16, display:"flex", alignItems:"center", gap:6 }}>

          </div>

      </div>

          div[style*="left: 220px"] { left: 0 !important; }

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
